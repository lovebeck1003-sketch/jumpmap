  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;

    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 24px;
    background: linear-gradient(to top, #081223 0%, #04061b 55%, #000 100%);

    gap: 8px;
    width: 220px;
    height: 150px;
    text-decoration: none;
    color: #fff;
    background: rgba(0,0,0,0.55);
    border: 2px solid rgba(255,255,255,0.18);
    border-radius: 16px;
    transition: transform .15s, border-color .15s, box-shadow .15s;
  }
  a.card:hover { transform: translateY(-4px); border-color: #4455ff; box-shadow: 0 8px 26px rgba(68,85,255,0.35); }
  a.card .emoji { font-size: 46px; }
  a.card .title { font-size: 20px; font-weight: bold; letter-spacing: 1px; }

  footer { font-size: 11px; color: #55637d; margin-top: 8px; }
  .qr-title { font-size: 13px; color: #8ea0c0; letter-spacing: 1px; margin-bottom: -6px; }
  .qrs { display: flex; flex-wrap: wrap; gap: 24px; justify-content: center; margin-top: 6px; }
  .qritem { display: flex; flex-direction: column; align-items: center; gap: 8px; }
